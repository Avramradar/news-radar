name: NEWS RADAR

on:
  schedule:
    # Обычная новость каждые 15 минут
    - cron: "3,18,33,48 * * * *"

    # Сводка в 08:05 и 20:05 по Москве
    # 05:05 и 17:05 UTC
    - cron: "5 5,17 * * *"

    # Food Radar в 09:00, 13:00, 17:00 и 21:00 по Москве
    # 06:00, 10:00, 14:00 и 18:00 UTC
    - cron: "0 6,10,14,18 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Что запустить вручную"
        required: true
        default: "news"
        type: choice
        options:
          - news
          - digest
          - food

permissions:
  contents: write

concurrency:
  group: news-radar-${{ github.event.schedule || inputs.mode || 'manual' }}
  cancel-in-progress: false

jobs:
  publish-news:
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.mode == 'news' ||
      github.event_name == 'schedule' &&
      github.event.schedule == '3,18,33,48 * * * *'

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Получить файлы
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Опубликовать обычную новость
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL: "@newsRadar2026"
          POSTS_PER_RUN: "1"
          MODE: "news"
        run: python app.py

      - name: Сохранить posted.json
        run: |
          git config user.name "news-radar-bot"
          git config user.email "actions@users.noreply.github.com"

          if [ -f posted.json ]; then
            git add posted.json
          fi

          if git diff --cached --quiet; then
            echo "Новых изменений нет"
            exit 0
          fi

          git commit -m "Update published news"
          git pull --rebase origin main
          git push origin main

  publish-food:
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.mode == 'food' ||
      github.event_name == 'schedule' &&
      github.event.schedule == '0 6,10,14,18 * * *'

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Получить файлы
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Опубликовать рецепт Food Radar
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

          FOOD_CHANNEL: "@FoodRadarDaily"
          NEWS_CHANNEL: "@newsRadar2026"

          FOOD_TEXT: ${{ vars.FOOD_TEXT }}
          FOOD_SOURCE_URL: ${{ vars.FOOD_SOURCE_URL }}
          FOOD_MESSAGE_ID: ${{ vars.FOOD_MESSAGE_ID }}
          FOOD_RSS_URLS: ${{ vars.FOOD_RSS_URLS }}
          FOOD_IMAGE_URL: ${{ vars.FOOD_IMAGE_URL }}
        run: python food_runner.py

      - name: Сохранить состояние Food Radar
        run: |
          git config user.name "news-radar-bot"
          git config user.email "actions@users.noreply.github.com"

          if [ -f food_state.json ]; then
            git add food_state.json
          fi

          if [ -f food_to_news_state.json ]; then
            git add food_to_news_state.json
          fi

          if git diff --cached --quiet; then
            echo "Новых изменений нет"
            exit 0
          fi

          git commit -m "Update published food"
          git pull --rebase origin main
          git push origin main

  publish-digest:
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.mode == 'digest' ||
      github.event_name == 'schedule' &&
      github.event.schedule == '5 5,17 * * *'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Получить файлы
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Опубликовать расширенную сводку
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL: "@newsRadar2026"
          MODE: "digest"
        run: python app.py
